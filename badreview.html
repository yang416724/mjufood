<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>避雷吐槽墙 - 舌尖上的闽大</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="nav-brand">
            <a href="index.html"><img src="images/logo.png" alt="Logo" class="nav-logo"></a>
            <a href="index.html" class="nav-brand-text">舌尖上的闽大</a>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">首页</a>
            <a href="cafeteria.html" class="nav-link">食堂测评</a>
            <a href="mealplan.html" class="nav-link">食谱</a>
            <a href="buddy.html" class="nav-link">找搭子</a>
        </div>
        <div class="nav-user">
            <span id="current-user">干饭人</span>
            <button class="logout-btn" onclick="handleLogout()">退出</button>
        </div>
    </nav>

    <!-- 页面内容 -->
    <main class="main-content">
        <!-- 避雷吐槽墙 -->
        <section id="page-badreview" class="page active">
            <div class="page-header">
                <h2>避雷吐槽墙</h2>
                <p>分享踩雷经历，让同学们少走弯路</p>
            </div>
            <div class="badreview-container">
                <!-- 发布吐槽 -->
                <div class="badreview-form">
                    <h3>发布避雷吐槽</h3>
                    <input type="text" id="badreview-shop" placeholder="店铺名称">
                    <textarea id="badreview-content" placeholder="分享你的踩雷经历..."></textarea>
                    <div class="badreview-tags">
                        <label><input type="checkbox" name="badtag" value="分量少"> 分量少</label>
                        <label><input type="checkbox" name="badtag" value="味道咸"> 味道咸</label>
                        <label><input type="checkbox" name="badtag" value="价格贵"> 价格贵</label>
                        <label><input type="checkbox" name="badtag" value="不新鲜"> 不新鲜</label>
                        <label><input type="checkbox" name="badtag" value="服务差"> 服务差</label>
                        <label><input type="checkbox" name="badtag" value="环境脏"> 环境脏</label>
                    </div>
                    <div class="badreview-rating">
                        <span>踩雷指数：</span>
                        <select id="badreview-score">
                            <option value="1">1星</option>
                            <option value="2">2星</option>
                            <option value="3">3星</option>
                            <option value="4">4星</option>
                            <option value="5">5星</option>
                        </select>
                    </div>
                    <button class="btn btn-danger" onclick="submitBadReview()">发布吐槽</button>
                </div>
                
                <!-- 吐槽列表 -->
                <div class="badreview-list">
                    <h3>踩雷榜单</h3>
                    <div id="badreview-items"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // 获取吐槽数据
        function getBadReviews() {
            return JSON.parse(localStorage.getItem('badReviews')) || [];
        }

        // 提交吐槽
        function submitBadReview() {
            const shop = document.getElementById('badreview-shop').value.trim();
            const content = document.getElementById('badreview-content').value.trim();
            const score = parseInt(document.getElementById('badreview-score').value);
            const tags = Array.from(document.querySelectorAll('input[name="badtag"]:checked')).map(cb => cb.value);

            if (!shop || !content) {
                alert('请填写店铺名称和吐槽内容！');
                return;
            }

            const review = {
                id: Date.now(),
                shop,
                content,
                score,
                tags,
                time: new Date().toLocaleString()
            };

            const reviews = getBadReviews();
            reviews.unshift(review);
            localStorage.setItem('badReviews', JSON.stringify(reviews));

            document.getElementById('badreview-shop').value = '';
            document.getElementById('badreview-content').value = '';
            document.querySelectorAll('input[name="badtag"]').forEach(cb => cb.checked = false);

            renderBadReviews();
            alert('吐槽发布成功！');
        }

        // 渲染吐槽列表
        function renderBadReviews() {
            const reviews = getBadReviews();
            const container = document.getElementById('badreview-items');

            if (reviews.length === 0) {
                container.innerHTML = '<p class="empty-state">暂无吐槽，暂无踩雷</p>';
                return;
            }

            container.innerHTML = reviews.map(review => `
                <div class="badreview-item">
                    <div class="badreview-header">
                        <h4>${review.shop}</h4>
                        <span class="badreview-score">${'!'.repeat(review.score)}</span>
                    </div>
                    <p class="badreview-content">${review.content}</p>
                    <div class="badreview-tags">
                        ${review.tags.map(t => `<span class="tag tag-danger">${t}</span>`).join('')}
                    </div>
                    <div class="badreview-footer">
                        <span class="badreview-time">${review.time}</span>
                    </div>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', renderBadReviews);
    </script>
</body>
</html>
