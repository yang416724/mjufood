<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食搭子匹配 - 舌尖上的闽大</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #003366;
            --primary-dark: #e55a2b;
            --secondary: #f7c59f;
            --accent: #FFB6C1;
            --secondary: #87CEEB;
            --dark: #1a1a2e;
            --light: #f8f9fa;
            --gray: #6c757d;
        }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #e8f4fc 0%, #f0e6f6 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 2rem;
            color: var(--dark);
            margin-bottom: 0.5rem;
        }
        .buddy-profile {
            background: var(--light);
            padding: 2rem;
            border-radius: 16px;
        }
        .buddy-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin: 1.5rem 0;
        }
        .buddy-tag {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .buddy-tag:hover {
            border-color: var(--primary);
        }
        .buddy-tag.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .buddy-match-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .buddy-match-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255,107,53,0.4);
        }
        .buddy-result {
            margin-top: 2rem;
            text-align: center;
        }
        .buddy-match-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            border-radius: 16px;
            margin-top: 1rem;
        }
        .buddy-match-card h3 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
        }
        .buddy-match-card p {
            line-height: 1.6;
            opacity: 0.9;
        }
        .buddy-invite {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
        }
        .buddy-invite-btn {
            padding: 0.75rem 2rem;
            background: white;
            color: var(--primary);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }
        .back-btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.75rem 2rem;
            background: var(--dark);
            color: white;
            text-decoration: none;
            border-radius: 25px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--dark);
            color: white;
            padding: 1rem 2rem;
            border-radius: 25px;
            z-index: 1000;
        }

        /* 移动端响应式 */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .container {
                padding: 1.5rem;
                border-radius: 15px;
            }
            .header h1 {
                font-size: 1.5rem;
            }
            .header p {
                font-size: 0.9rem;
            }
            .buddy-profile {
                padding: 1.5rem;
            }
            .buddy-profile h3 {
                font-size: 1.1rem;
            }
            .buddy-tags {
                gap: 0.5rem;
            }
            .buddy-tag {
                padding: 0.4rem 0.8rem;
                font-size: 0.9rem;
            }
            .buddy-match-btn {
                padding: 0.875rem;
                font-size: 1rem;
            }
            .buddy-match-card {
                padding: 1.5rem;
            }
            .buddy-match-card h3 {
                font-size: 1.1rem;
            }
            .buddy-invite-btn {
                padding: 0.6rem 1.5rem;
                font-size: 0.9rem;
            }
            .back-btn {
                padding: 0.5rem 1.5rem;
                font-size: 0.9rem;
                margin-top: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 0.75rem;
            }
            .container {
                padding: 1rem;
                border-radius: 12px;
            }
            .header h1 {
                font-size: 1.3rem;
            }
            .buddy-profile {
                padding: 1rem;
            }
            .buddy-tags {
                gap: 0.4rem;
            }
            .buddy-tag {
                padding: 0.3rem 0.6rem;
                font-size: 0.85rem;
            }
            .buddy-match-btn {
                padding: 0.75rem;
                font-size: 0.95rem;
            }
            .buddy-match-card {
                padding: 1rem;
            }
            .buddy-match-card h3 {
                font-size: 1rem;
            }
            .buddy-invite-btn {
                padding: 0.5rem 1.25rem;
                font-size: 0.85rem;
            }
            .toast {
                padding: 0.75rem 1.5rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>美食搭子匹配</h1>
            <p>填写口味偏好，找到志同道合的饭搭子</p>
        </div>
        
        <div class="buddy-profile">
            <h3>设置你的口味偏好</h3>
            <div class="buddy-tags">
                <label class="buddy-tag" onclick="this.classList.toggle('selected')">
                    <input type="checkbox" name="preference" value="吃辣" hidden> 吃辣
                </label>
                <label class="buddy-tag" onclick="this.classList.toggle('selected')">
                    <input type="checkbox" name="preference" value="不吃辣" hidden> 不吃辣
                </label>
                <label class="buddy-tag" onclick="this.classList.toggle('selected')">
                    <input type="checkbox" name="preference" value="爱吃面食" hidden> 爱吃面食
                </label>
                <label class="buddy-tag" onclick="this.classList.toggle('selected')">
                    <input type="checkbox" name="preference" value="爱吃米饭" hidden> 爱吃米饭
                </label>
                <label class="buddy-tag" onclick="this.classList.toggle('selected')">
                    <input type="checkbox" name="preference" value="爱吃甜食" hidden> 爱吃甜食
                </label>
                <label class="buddy-tag" onclick="this.classList.toggle('selected')">
                    <input type="checkbox" name="preference" value="不吃葱" hidden> 不吃葱
                </label>
                <label class="buddy-tag" onclick="this.classList.toggle('selected')">
                    <input type="checkbox" name="preference" value="不吃香菜" hidden> 不吃香菜
                </label>
                <label class="buddy-tag" onclick="this.classList.toggle('selected')">
                    <input type="checkbox" name="preference" value="素食" hidden> 素食
                </label>
                <label class="buddy-tag" onclick="this.classList.toggle('selected')">
                    <input type="checkbox" name="preference" value="低价实惠" hidden> 低价实惠
                </label>
                <label class="buddy-tag" onclick="this.classList.toggle('selected')">
                    <input type="checkbox" name="preference" value="追求品质" hidden> 追求品质
                </label>
            </div>
            <button class="buddy-match-btn" onclick="matchBuddy()">匹配饭搭子</button>
        </div>
        
        <div id="buddy-result" class="buddy-result hidden">
            <div class="buddy-match-card">
                <h3>匹配到的饭搭子</h3>
                <div id="buddy-match-content"></div>
                <div class="buddy-invite">
                    <button class="buddy-invite-btn" onclick="generateInviteText()">生成邀约文案</button>
                    <p class="buddy-invite-hint" style="margin-top:0.5rem;opacity:0.8;font-size:0.875rem;">复制文案发送给好友，一起约饭吧！</p>
                </div>
            </div>
        </div>
        
        <div style="text-align: center;">
            <a href="index.html" class="back-btn">返回首页</a>
        </div>
    </div>
    
    <script>
        const buddyProfiles = [
            { name: '辣妹子', traits: ['吃辣', '爱吃米饭'], desc: '无辣不欢，米饭一定要配重口味菜！' },
            { name: '养生达人', traits: ['不吃辣', '爱吃面食', '素食'], desc: '清淡饮食，追求健康生活' },
            { name: '甜食控', traits: ['爱吃甜食', '追求品质'], desc: '餐后一定要来点甜的才满足' },
            { name: '省钱大师', traits: ['低价实惠', '爱吃米饭'], desc: '性价比至上，米饭管饱就行' },
            { name: '嗦粉狂魔', traits: ['吃辣', '爱吃面食'], desc: '各种粉类都是心头好' }
        ];

        function matchBuddy() {
            const selected = Array.from(document.querySelectorAll('.buddy-tag.selected'))
                .map(el => el.textContent.trim());
            
            if (selected.length === 0) {
                showToast('请至少选择一个口味偏好');
                return;
            }
            
            // 简单匹配逻辑
            const match = buddyProfiles[Math.floor(Math.random() * buddyProfiles.length)];
            const matchCount = selected.filter(s => match.traits.includes(s)).length;
            const score = Math.min(100, matchCount * 25 + Math.random() * 20);
            
            document.getElementById('buddy-match-content').innerHTML = `
                <p><strong>${match.name}</strong></p>
                <p style="margin-top:0.5rem;">匹配度: ${Math.round(score)}%</p>
                <p style="margin-top:1rem;">${match.desc}</p>
                <p style="margin-top:0.5rem;font-size:0.875rem;opacity:0.8;">口味标签: ${match.traits.join('、')}</p>
            `;
            document.getElementById('buddy-result').classList.remove('hidden');
        }

        function generateInviteText() {
            const text = '嘿！发现了一个超棒的校园美食平台"舌尖上的闽大"，一起约饭吗？';
            navigator.clipboard.writeText(text).then(() => {
                showToast('文案已复制到剪贴板！');
            });
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
    </script>
</body>
</html>
