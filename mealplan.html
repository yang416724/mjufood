<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一周食谱计划 - 舌尖上的闽大</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <nav class="navbar">
            <div class="nav-brand">
                <a href="index.html"><img src="images/logo.png" alt="Logo" class="nav-logo"></a>
                <a href="index.html" class="nav-brand-text">舌尖上的闽大</a>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">首页</a>
                <a href="cafeteria.html" class="nav-link">食堂测评</a>
                <a href="mealplan.html" class="nav-link active">食谱</a>
                <a href="buddy.html" class="nav-link">找搭子</a>
                <a href="badreview.html" class="nav-link">避雷墙</a>
            </div>
        </nav>

        <main class="main-content">
            <section class="page active">
                <div class="page-header">
                    <h2>一周食谱计划</h2>
                    <p>从收藏中选择美食，安排你的一周饮食</p>
                </div>
                <div class="mealplan-container">
                    <div class="mealplan-header">
                        <div class="mealplan-weekdays">
                            <div class="weekday-label"></div>
                            <div class="weekday-label">早餐</div>
                            <div class="weekday-label">午餐</div>
                            <div class="weekday-label">晚餐</div>
                        </div>
                    </div>
                    <div class="mealplan-grid" id="mealplan-grid">
                        <div class="mealplan-row" data-day="周一">
                            <div class="weekday-name">周一</div>
                            <div class="meal-slot" data-meal="breakfast" onclick="selectMeal(this, '周一', 'breakfast')">
                                <span class="meal-placeholder">点击选择</span>
                            </div>
                            <div class="meal-slot" data-meal="lunch" onclick="selectMeal(this, '周一', 'lunch')">
                                <span class="meal-placeholder">点击选择</span>
                            </div>
                            <div class="meal-slot" data-meal="dinner" onclick="selectMeal(this, '周一', 'dinner')">
                                <span class="meal-placeholder">点击选择</span>
                            </div>
                        </div>
                        <div class="mealplan-row" data-day="周二">
                            <div class="weekday-name">周二</div>
                            <div class="meal-slot" data-meal="breakfast" onclick="selectMeal(this, '周二', 'breakfast')">
                                <span class="meal-placeholder">点击选择</span>
                            </div>
                            <div class="meal-slot" data-meal="lunch" onclick="selectMeal(this, '周二', 'lunch')">
                                <span class="meal-placeholder">点击选择</span>
                            </div>
                            <div class="meal-slot" data-meal="dinner" onclick="selectMeal(this, '周二', 'dinner')">
                                <span class="meal-placeholder">点击选择</span>
                            </div>
                        </div>
                        <div class="mealplan-row" data-day="周三">
                            <div class="weekday-name">周三</div>
                            <div class="meal-slot" data-meal="breakfast" onclick="selectMeal(this, '周三', 'breakfast')">
                                <span class="meal-placeholder">点击选择</span>
                            </div>
                            <div class="meal-slot" data-meal="lunch" onclick="selectMeal(this, '周三', 'lunch')">
                                <span class="meal-placeholder">点击选择</span>
                            </div>
                            <div class="meal-slot" data-meal="dinner" onclick="selectMeal(this, '周三', 'dinner')">
                                <span class="meal-placeholder">点击选择</span>
                            </div>
                        </div>
                        <div class="mealplan-row" data-day="周四">
                            <div class="weekday-name">周四</div>
                            <div class="meal-slot" data-meal="breakfast" onclick="selectMeal(this, '周四', 'breakfast')">
                                <span class="meal-placeholder">点击选择</span>
                            </div>
                            <div class="meal-slot" data-meal="lunch" onclick="selectMeal(this, '周四', 'lunch')">
                                <span class="meal-placeholder">点击选择</span>
                            </div>
                            <div class="meal-slot" data-meal="dinner" onclick="selectMeal(this, '周四', 'dinner')">
                                <span class="meal-placeholder">点击选择</span>
                            </div>
                        </div>
                        <div class="mealplan-row" data-day="周五">
                            <div class="weekday-name">周五</div>
                            <div class="meal-slot" data-meal="breakfast" onclick="selectMeal(this, '周五', 'breakfast')">
                                <span class="meal-placeholder">点击选择</span>
                            </div>
                            <div class="meal-slot" data-meal="lunch" onclick="selectMeal(this, '周五', 'lunch')">
                                <span class="meal-placeholder">点击选择</span>
                            </div>
                            <div class="meal-slot" data-meal="dinner" onclick="selectMeal(this, '周五', 'dinner')">
                                <span class="meal-placeholder">点击选择</span>
                            </div>
                        </div>
                        <div class="mealplan-row" data-day="周六">
                            <div class="weekday-name">周六</div>
                            <div class="meal-slot" data-meal="breakfast" onclick="selectMeal(this, '周六', 'breakfast')">
                                <span class="meal-placeholder">点击选择</span>
                            </div>
                            <div class="meal-slot" data-meal="lunch" onclick="selectMeal(this, '周六', 'lunch')">
                                <span class="meal-placeholder">点击选择</span>
                            </div>
                            <div class="meal-slot" data-meal="dinner" onclick="selectMeal(this, '周六', 'dinner')">
                                <span class="meal-placeholder">点击选择</span>
                            </div>
                        </div>
                        <div class="mealplan-row" data-day="周日">
                            <div class="weekday-name">周日</div>
                            <div class="meal-slot" data-meal="breakfast" onclick="selectMeal(this, '周日', 'breakfast')">
                                <span class="meal-placeholder">点击选择</span>
                            </div>
                            <div class="meal-slot" data-meal="lunch" onclick="selectMeal(this, '周日', 'lunch')">
                                <span class="meal-placeholder">点击选择</span>
                            </div>
                            <div class="meal-slot" data-meal="dinner" onclick="selectMeal(this, '周日', 'dinner')">
                                <span class="meal-placeholder">点击选择</span>
                            </div>
                        </div>
                    </div>
                    <div class="mealplan-actions">
                        <button class="mealplan-btn" onclick="clearMealPlan()">清空计划</button>
                        <button class="mealplan-btn accent" onclick="saveMealPlan()">保存计划</button>
                    </div>
                </div>
            </section>
        </main>

        <div id="meal-select-modal" class="modal hidden">
            <div class="modal-content">
                <button class="modal-close" onclick="closeMealSelectModal()">&times;</button>
                <div class="modal-body">
                    <h3 id="meal-select-title">选择美食</h3>
                    <p class="meal-select-hint">从你的收藏中选择：</p>
                    <div class="meal-select-grid" id="meal-select-grid"></div>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>© 闽江大学蛋仔派队 · 舌尖上的闽大</p>
        </footer>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script>
        const Storage = {
            get(key) { try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; } },
            set(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
        };

        const foodData = [
            { id: 1, name: '一堂拌面扁肉', rating: 4.5, image: 'images/c1-noodle.jpg' },
            { id: 2, name: '一堂肴伯黑鸭煲', rating: 4.5, image: 'images/c1-duck.jpg' },
            { id: 3, name: '一堂意面', rating: 4, image: 'images/c1-pasta.jpg' },
            { id: 4, name: '二堂干蒸菜', rating: 4.5, image: 'images/c2-steamed.jpg' },
            { id: 5, name: '二堂古茗奶茶', rating: 4.5, image: 'images/c2-milk-tea.jpg' },
            { id: 6, name: '二堂老丈人牛肉面', rating: 4.5, image: 'images/c2-beef-noodle.jpg' },
            { id: 7, name: '二堂麻辣烫', rating: 4, image: 'images/c2-hotpot.jpg' },
            { id: 8, name: '二堂米婆婆', rating: 4, image: 'images/c2-rice.jpg' },
            { id: 9, name: '二堂石锅拌饭', rating: 4.5, image: 'images/c2-bibimbap.jpg' },
            { id: 10, name: '二堂水果捞', rating: 4.5, image: 'images/c2-fruit.jpg' },
            { id: 11, name: '二堂五谷渔粉', rating: 4.5, image: 'images/c2-fish-noodle.jpg' },
            { id: 12, name: '二堂云南鸡汤米线', rating: 4.5, image: 'images/c2-rice-noodle.jpg' },
            { id: 13, name: '三堂烤盘饭', rating: 4.5, image: 'images/c3-bake.jpg' },
            { id: 14, name: '三堂麻辣香锅', rating: 4.5, image: 'images/c3-spicy-pot.jpg' },
            { id: 15, name: '三堂汤先生', rating: 4, image: 'images/c3-soup.jpg' },
            { id: 16, name: '北门肥姨妈螺蛳粉', rating: 4.5, image: 'images/off-snail-noodle.jpg' },
            { id: 17, name: '北门贵州冰浆', rating: 4.5, image: 'images/off-ice-drink.jpg' },
            { id: 18, name: '北门花甲粉', rating: 4, image: 'images/off-clam-noodle.jpg' },
            { id: 19, name: '北门铜锅鸡', rating: 4.5, image: 'images/off-pot-chicken.jpg' },
            { id: 20, name: '北门云贵川小吃', rating: 4, image: 'images/off-snack.jpg' }
        ];

        let currentMealSlot = null;

        document.addEventListener('DOMContentLoaded', () => {
            renderMealPlan();
        });

        function renderMealPlan() {
            const plan = Storage.get('mjufav_mealplan') || {};
            const days = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
            const meals = ['breakfast', 'lunch', 'dinner'];

            days.forEach(day => {
                const row = document.querySelector(`.mealplan-row[data-day="${day}"]`);
                if (!row) return;
                meals.forEach(meal => {
                    const slot = row.querySelector(`.meal-slot[data-meal="${meal}"]`);
                    const key = `${day}_${meal}`;
                    const foodId = plan[key];
                    if (foodId) {
                        const food = foodData.find(f => f.id === foodId);
                        if (food) {
                            slot.innerHTML = `<span class="meal-name">${food.name}</span>`;
                            slot.classList.add('has-food');
                        } else {
                            slot.innerHTML = '<span class="meal-placeholder">点击选择</span>';
                            slot.classList.remove('has-food');
                        }
                    } else {
                        slot.innerHTML = '<span class="meal-placeholder">点击选择</span>';
                        slot.classList.remove('has-food');
                    }
                });
            });
        }

        function selectMeal(slotEl, day, meal) {
            currentMealSlot = { day, meal, element: slotEl };
            const favorites = Storage.get('mjufav_spa');
            const favFoods = foodData.filter(f => favorites.includes(f.id));

            let foodsToShow = favFoods;
            if (foodsToShow.length === 0) {
                foodsToShow = foodData;
            }

            document.getElementById('meal-select-title').textContent = `${day} ${getMealName(meal)}`;
            const grid = document.getElementById('meal-select-grid');

            grid.innerHTML = foodsToShow.map(food => `
                <div class="meal-select-item" onclick="confirmMealSelect(${food.id})">
                    <div class="meal-select-emoji">F</div>
                    <div class="meal-select-name">${food.name}</div>
                    <div class="meal-select-rating">${'★'.repeat(Math.floor(food.rating))}</div>
                </div>
            `).join('');

            document.getElementById('meal-select-modal').classList.remove('hidden');
        }

        function getMealName(meal) {
            const names = { breakfast: '早餐', lunch: '午餐', dinner: '晚餐' };
            return names[meal] || meal;
        }

        function confirmMealSelect(foodId) {
            if (!currentMealSlot) return;
            const { day, meal } = currentMealSlot;
            const key = `${day}_${meal}`;

            let plan = Storage.get('mjufav_mealplan') || {};
            plan[key] = foodId;
            Storage.set('mjufav_mealplan', plan);

            closeMealSelectModal();
            renderMealPlan();
            showToast('已添加到食谱计划！');
        }

        function closeMealSelectModal() {
            document.getElementById('meal-select-modal').classList.add('hidden');
            currentMealSlot = null;
        }

        document.getElementById('meal-select-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('meal-select-modal')) closeMealSelectModal();
        });

        function clearMealPlan() {
            if (!confirm('确定要清空一周食谱计划吗？')) return;
            Storage.set('mjufav_mealplan', {});
            renderMealPlan();
            showToast('食谱计划已清空');
        }

        function saveMealPlan() {
            const plan = Storage.get('mjufav_mealplan') || {};
            const keys = Object.keys(plan);
            if (keys.length === 0) {
                showToast('请先安排一些食谱！');
                return;
            }

            const days = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
            const meals = ['breakfast', 'lunch', 'dinner'];
            let text = '【舌尖上的闽大 · 一周食谱计划】\n';

            days.forEach(day => {
                text += `\n${day}:\n`;
                meals.forEach(meal => {
                    const foodId = plan[`${day}_${meal}`];
                    if (foodId) {
                        const food = foodData.find(f => f.id === foodId);
                        if (food) text += `  ${getMealName(meal)}: ${food.name}\n`;
                    }
                });
            });

            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => showToast('食谱计划已复制到剪贴板！'));
            } else {
                showToast('保存成功！');
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.remove('hidden');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.add('hidden'), 2500);
        }
    </script>
</body>
</html>
