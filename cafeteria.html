<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食堂美食测评 - 舌尖上的闽大</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #003366;
            --accent: #FFB6C1;
            --secondary: #87CEEB;
            --dark: #1a1a2e;
            --light: #f8f9fa;
            --gray: #6c757d;
            --warning: #ffc107;
        }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #e8f4fc 0%, #f0e6f6 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 2rem;
            color: var(--dark);
            margin-bottom: 0.5rem;
        }
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .filter-tab {
            padding: 0.5rem 1.25rem;
            border: 2px solid #e9ecef;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.875rem;
        }
        .filter-tab:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .filter-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }
        .food-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: all 0.3s;
            cursor: pointer;
        }
        .food-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
        }
        .food-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        .food-image-placeholder {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: white;
        }
        .food-content {
            padding: 1rem;
        }
        .food-name {
            font-weight: 600;
            font-size: 1rem;
            color: var(--dark);
            margin-bottom: 0.5rem;
        }
        .food-rating {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .stars {
            color: var(--warning);
        }
        .rating-tag {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 10px;
        }
        .rating-tag.excellent {
            background: rgba(255,107,53,0.1);
            color: var(--primary);
        }
        .rating-tag.good {
            background: rgba(46,196,182,0.1);
            color: var(--accent);
        }
        .food-review {
            color: var(--gray);
            font-size: 0.875rem;
            line-height: 1.5;
            margin-bottom: 0.5rem;
        }
        .food-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .food-reviewer {
            color: #adb5bd;
            font-size: 0.75rem;
        }
        .fav-btn {
            background: none;
            border: none;
            font-size: 1.25rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .fav-btn:hover {
            transform: scale(1.2);
        }
        .back-btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.75rem 2rem;
            background: var(--dark);
            color: white;
            text-decoration: none;
            border-radius: 25px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--dark);
            color: white;
            padding: 1rem 2rem;
            border-radius: 25px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>食堂美食测评</h1>
            <p>分堂测评，精准避坑</p>
        </div>
        
        <div class="filter-tabs">
            <button class="filter-tab active" data-canteen="all" onclick="filterCanteen('all')">全部</button>
            <button class="filter-tab" data-canteen="1" onclick="filterCanteen('1')">第一食堂</button>
            <button class="filter-tab" data-canteen="2" onclick="filterCanteen('2')">第二食堂</button>
            <button class="filter-tab" data-canteen="3" onclick="filterCanteen('3')">第三食堂</button>
            <button class="filter-tab" data-canteen="4" onclick="filterCanteen('4')">第四食堂</button>
        </div>
        
        <div class="food-grid" id="food-grid"></div>
        
        <div style="text-align: center;">
            <a href="index.html" class="back-btn">返回首页</a>
        </div>
    </div>
    
    <script>
        const foodData = [
            { id: 1, name: '一堂拌面扁肉', rating: 4.5, review: '拌面劲道，扁肉汤鲜味美，早餐首选', reviewer: '早起鸟', canteen: '1', tag: '推荐', image: 'images/一堂拌面扁肉.jpg' },
            { id: 2, name: '一堂肴伯黑鸭煲', rating: 4.5, review: '黑鸭煲香辣入味，配菜丰富，超级下饭', reviewer: '辣妹子', canteen: '1', tag: '推荐', image: 'images/一堂肴伯黑鸭煲.jpg' },
            { id: 3, name: '一堂意面', rating: 4, review: '意面口感不错，煎蛋很香，分量足', reviewer: '西餐控', canteen: '1', tag: '推荐', image: 'images/一堂意面.jpg' },
            { id: 4, name: '二堂干蒸菜', rating: 4.5, review: '干蒸排骨和牛肉都很香，配米饭绝了', reviewer: '干饭王', canteen: '2', tag: '推荐', image: 'images/二堂干蒸菜.jpg' },
            { id: 5, name: '二堂古茗奶茶', rating: 4.5, review: '芝士葡萄超好喝，奶盖浓郁，果茶清爽', reviewer: '奶茶控', canteen: '2', tag: '推荐', image: 'images/二堂古茗.jpg' },
            { id: 6, name: '二堂老丈人牛肉面', rating: 4.5, review: '牛肉大片，汤底醇厚，花生很香', reviewer: '面食控', canteen: '2', tag: '推荐', image: 'images/二堂老丈人牛肉面.jpg' },
            { id: 7, name: '二堂麻辣烫', rating: 4, review: '菜品丰富，汤底浓郁，丸子很Q弹', reviewer: '辣妹子', canteen: '2', tag: '推荐', image: 'images/二堂麻辣烫.jpg' },
            { id: 8, name: '二堂米婆婆', rating: 4, review: '锅包肉酥脆，麻婆豆腐嫩滑，金针菇下饭', reviewer: '东北胃', canteen: '2', tag: '推荐', image: 'images/二堂米婆婆.jpg' },
            { id: 9, name: '二堂石锅拌饭', rating: 4.5, review: '五花肉石锅拌饭，泡菜酸辣开胃，溏心蛋完美', reviewer: '韩料控', canteen: '2', tag: '推荐', image: 'images/二堂石锅拌饭.jpg' },
            { id: 10, name: '二堂水果捞', rating: 4.5, review: '水果新鲜种类多，芒果超甜，车厘子很大颗', reviewer: '甜食控', canteen: '2', tag: '推荐', image: 'images/二堂水果捞.jpg' },
            { id: 11, name: '二堂五谷渔粉', rating: 4.5, review: '渔粉滑嫩，炸蛋吸满汤汁，香菜提味', reviewer: '嗦粉达人', canteen: '2', tag: '推荐', image: 'images/二堂五谷渔粉.jpg' },
            { id: 12, name: '二堂云南鸡汤米线', rating: 4.5, review: '鸡汤鲜美，鱼肉嫩滑，豌豆酥脆', reviewer: '养生党', canteen: '2', tag: '推荐', image: 'images/二堂云南鸡汤米线.jpg' },
            { id: 13, name: '三堂烤盘饭', rating: 4.5, review: '烤盘饭香辣过瘾，配菜丰富，米饭管饱', reviewer: '干饭王', canteen: '3', tag: '推荐', image: 'images/三堂烤盘饭.jpg' },
            { id: 14, name: '三堂麻辣香锅', rating: 4.5, review: '麻辣香锅料足味正，丸子和蔬菜搭配完美', reviewer: '重口味', canteen: '3', tag: '推荐', image: 'images/三堂麻辣香锅.jpg' },
            { id: 15, name: '三堂汤先生', rating: 4, review: '黑椒肉片嫩滑，配菜丰富，营养均衡', reviewer: '养生党', canteen: '3', tag: '推荐', image: 'images/三堂汤先生.jpg' },
            { id: 16, name: '北门肥姨妈螺蛳粉', rating: 4.5, review: '螺蛳粉正宗，腐竹和酸笋超多，汤底浓郁', reviewer: '嗦粉达人', canteen: null, tag: '推荐', image: 'images/北门肥姨妈螺蛳粉.jpg' },
            { id: 17, name: '北门贵州冰浆', rating: 4.5, review: '冰浆绵密细腻，芒果和绿豆口味都超赞', reviewer: '甜食控', canteen: null, tag: '推荐', image: 'images/北门贵州冰浆2.jpg' },
            { id: 18, name: '北门花甲粉', rating: 4, review: '花甲新鲜，锡纸锁住鲜味，汤底香辣可口', reviewer: '夜宵党', canteen: null, tag: '推荐', image: 'images/北门花甲粉.jpg' },
            { id: 19, name: '北门铜锅鸡', rating: 4.5, review: '铜锅鸡分量超大，鸡肉嫩滑，配菜丰富', reviewer: '聚餐达人', canteen: null, tag: '推荐', image: 'images/北门铜锅鸡1.jpg' },
            { id: 20, name: '北门云贵川小吃', rating: 4, review: '土豆和米粉搭配很有特色，香辣入味', reviewer: '重口味', canteen: null, tag: '推荐', image: 'images/北门云贵川小吃.jpg' }
        ];

        const Storage = {
            get(key) { try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; } },
            set(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
        };

        function init() {
            renderFoods('all');
        }

        function filterCanteen(canteen) {
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.canteen === canteen);
            });
            renderFoods(canteen);
        }

        function renderFoods(canteen) {
            let filtered = foodData.filter(f => f.type === 'cafeteria');
            if (canteen !== 'all') {
                filtered = filtered.filter(f => f.canteen === canteen);
            }
            
            const favorites = Storage.get('mjufav_spa');
            const grid = document.getElementById('food-grid');
            
            if (filtered.length === 0) {
                grid.innerHTML = '<p style="text-align:center;color:#6c757d;padding:3rem;">暂无数据</p>';
                return;
            }
            
            grid.innerHTML = filtered.map(food => {
                const isFav = favorites.includes(food.id);
                return `
                    <div class="food-card">
                        ${food.image ? `<img src="${food.image}" alt="${food.name}" class="food-image" loading="lazy">` : '<div class="food-image-placeholder">F</div>'}
                        <div class="food-content">
                            <div class="food-name">${food.name}</div>
                            <div class="food-rating">
                                <span class="stars">${'★'.repeat(Math.floor(food.rating))}${'☆'.repeat(5 - Math.floor(food.rating))}</span>
                                <span class="rating-tag ${food.rating >= 4.5 ? 'excellent' : 'good'}">${food.tag} · ${food.rating}星</span>
                            </div>
                            <div class="food-review">${food.review}</div>
                            <div class="food-footer">
                                <span class="food-reviewer">— ${food.reviewer}</span>
                                <button class="fav-btn" onclick="toggleFav(${food.id}, event)">${isFav ? '★' : '☆'}</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleFav(id, event) {
            event.stopPropagation();
            const favorites = Storage.get('mjufav_spa');
            const index = favorites.indexOf(id);
            
            if (index === -1) {
                favorites.push(id);
                showToast('已添加到收藏');
            } else {
                favorites.splice(index, 1);
                showToast('已取消收藏');
            }
            
            Storage.set('mjufav_spa', favorites);
            const activeTab = document.querySelector('.filter-tab.active');
            renderFoods(activeTab ? activeTab.dataset.canteen : 'all');
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        init();
    </script>
</body>
</html>
